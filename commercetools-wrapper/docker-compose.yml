#      - MCP_SERVER_SSE_URL=http://foundational-mcp-server:8000/sse
#    depends_on:
#      - api-gateway
#      - foundational-mcp-server

  federated-agents-v2:
    build: ../federated-agents-v2
    ports:
      - "8090:8000"
    networks:
      - commercetools-net
    environment:
      - API_BASE_URL=http://api-gateway:8080/api
      - LM_STUDIO_URL=http://host.docker.internal:1234/v1
      - MODEL_NAME=qwen3-4b-instruct-2507-mlx
      - MCP_SERVER_SSE_URL=http://foundational-mcp-server:8000/sse
      - AGENT_API_KEY=${AGENT_API_KEY:-prod-secret-123}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - api-gateway
      - foundational-mcp-server

networks:
  commercetools-net:
    driver: bridge
